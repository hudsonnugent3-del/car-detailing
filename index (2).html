<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supreme Detailing</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #141414;
    border: 1px solid #222;
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .logo-circle {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }
  .tagline {
    font-size: 13px;
    color: #666;
    margin-bottom: 32px;
  }
  .divider {
    height: 1px;
    background: #222;
    margin-bottom: 28px;
  }
  .btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 20px;
    border-radius: 14px;
    border: 1px solid #2a2a2a;
    background: #1c1c1c;
    color: #fff;
    text-decoration: none;
    margin-bottom: 14px;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    cursor: pointer;
  }
  .btn:hover { background: #252525; border-color: #3a3a3a; }
  .btn:active { transform: scale(0.98); }
  .btn-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .btn-label { font-size: 15px; font-weight: 500; color: #fff; display: block; text-align: left; }
  .btn-sub { font-size: 12px; color: #666; display: block; margin-top: 2px; text-align: left; }
  .btn-arrow { margin-left: auto; color: #444; font-size: 18px; }
  .footer { margin-top: 28px; font-size: 12px; color: #444; }
</style>
</head>
